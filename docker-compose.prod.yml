name: garden-prod

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_etc:/var/www/certbot
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_healthy
    networks:
      - garden-network

  server:
    image: ghcr.io/proj-root/garden-server:latest
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    depends_on:
      - redis
    healthcheck:
      test: [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5175/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - garden-network

  client:
    image: ghcr.io/proj-root/garden-client:latest
    restart: unless-stopped
    healthcheck:
      test: [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - garden-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - garden-network

networks:
  garden-network:
    driver: bridge

volumes:
  redis_data:
  certbot_etc:
