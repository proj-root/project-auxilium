name: garden-prod

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_etc:/var/www/certbot
    depends_on:
      - client
      - server
    networks:
      - garden-network

  server:
    image: ghcr.io/proj-root/garden-server:latest
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    depends_on:
      - redis
    healthcheck:
      test: [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5175/api/health",
        ] # Or any endpoint
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s # Gives entrypoint time to finish migrations
    networks:
      - garden-network

  client:
    image: ghcr.io/proj-root/garden-client:latest
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=https://garden.junkaizhang.com/api
    networks:
      - garden-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - garden-network

networks:
  garden-network:
    driver: bridge

volumes:
  redis_data:
  certbot_etc:
