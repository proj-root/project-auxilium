server {
  listen 80;
  server_name garden.junkaizhang.com;

  # Certbot challenge path
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name garden.junkaizhang.com;

  # Set up SSL certs
  ssl_certificate /etc/letsencrypt/live/garden.junkaizhang.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/garden.junkaizhang.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Route requests to Frontend
  location / {
    proxy_pass http://client:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Route requests to Backend API
  location /api/ {
    proxy_pass http://server:5175;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}