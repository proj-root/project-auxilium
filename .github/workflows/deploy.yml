name: Production CI/CD

on:
  push:
    branches: [main]

env:
  ORG_NAME: proj-root

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Extract repository name in lowercase (required for Docker image tags)
      # - name: Lowercase Repository Name
      #   run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 3. Build & Push Server Container
      - name: Build and Push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ORG_NAME }}/garden-server:latest

      # 4. Build & Push Client Container
      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://garden.junkaizhang.com/api
          push: true
          tags: ghcr.io/${{ env.ORG_NAME }}/garden-client:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Option A: Deploy via SSH directly to VPS
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/garden
            
            git switch main
            git pull

            npm run db:deploy --workspace=server
            npm run seed:prod --workspace=server

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
